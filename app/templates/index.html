{% extends "base.html" %}

{% block title %}Beranda | LaporKita{% endblock %}

{% block content %}
<main class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gradient-to-br from-blue-50 to-indigo-100">
    <div class="max-w-xl w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-gray-100">
        <div>
            <h1 class="text-center text-4xl font-extrabold text-indigo-700 tracking-tight">
                Lapor<span class="text-gray-900">Kita</span>
            </h1>
            <p class="mt-3 text-center text-sm text-gray-500">
                Sistem Pengaduan Publik Pintar. Laporkan masalah Anda, AI kami akan menganalisis dan meneruskannya ke Dinas terkait.
            </p>
        </div>
        <form id="laporForm" class="mt-8 space-y-6" action="/submit-laporan" method="POST">
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="nik" class="block text-sm font-medium text-gray-700">NIK</label>
                    <input id="nik" name="nik" type="text" required class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-lg focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm mt-1" placeholder="Masukkan 16 digit NIK">
                </div>
                <div>
                    <label for="nama" class="block text-sm font-medium text-gray-700">Nama Lengkap</label>
                    <input id="nama" name="nama" type="text" required class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-lg focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm mt-1" placeholder="Nama sesuai KTP">
                </div>
                <div>
                    <label for="no_hp" class="block text-sm font-medium text-gray-700">Nomor WhatsApp Aktif</label>
                    <input id="no_hp" name="no_hp" type="text" required class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-lg focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm mt-1" placeholder="0812xxxxxxxx">
                </div>
                <div>
                    <label for="kecamatan" class="block text-sm font-medium text-gray-700">Kecamatan/Kelurahan</label>
                    <select id="kecamatan" name="kecamatan" required class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-lg border">
                        <option value="" disabled selected>Pilih Lokasi Kejadian</option>
                        <option value="Kecamatan A">Kecamatan A</option>
                        <option value="Kecamatan B">Kecamatan B</option>
                        <option value="Kecamatan C">Kecamatan C</option>
                    </select>
                </div>
                <div>
                    <label for="keluhan" class="block text-sm font-medium text-gray-700">Detail Keluhan (Lokasi Spesifik & Masalah)</label>
                    <textarea id="keluhan" name="keluhan" rows="4" required class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-lg focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm mt-1" placeholder="Jelaskan masalah secara detail beserta nama jalan/lokasi..."></textarea>
                </div>
            </div>

            <div id="statusMessage" class="hidden text-sm font-medium text-center p-3 rounded-lg"></div>

            <div>
                <button type="submit" id="submitBtn" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors duration-200 shadow-md">
                    <span id="btnText">Kirim Laporan</span>
                    <svg id="loadingSpinner" class="hidden animate-spin ml-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </div>
        </form>
    </div>
</main>
{% endblock %}

{% block scripts %}
<script src="/static/js/app.js"></script>
{% endblock %}
