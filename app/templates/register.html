{% extends "base.html" %}

{% block title %}Registrasi Petugas | LaporKita{% endblock %}

{% block content %}
<main class="min-h-screen flex items-center justify-center py-12 px-4 bg-gradient-to-br from-slate-100 to-slate-200">
    <div class="max-w-md w-full bg-white p-10 rounded-2xl shadow-xl border border-gray-100 space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-extrabold text-slate-800">Lapor<span class="text-indigo-600">Kita</span></h1>
            <p class="mt-1 text-sm text-gray-500">Pendaftaran Akun Petugas Dinas baru</p>
        </div>

        {% if error %}
        <div class="p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700 text-center">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/admin/register" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
                <input id="username" name="username" type="text" required autofocus
                    class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                <input id="password" name="password" type="password" required
                    class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label for="nama_dinas" class="block text-sm font-medium text-gray-700">Nama Dinas / Instansi</label>
                <select id="nama_dinas" name="nama_dinas" required
                    class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                    <option value="" disabled selected>Pilih Dinas Anda</option>
                    <option value="Dinas PU">Dinas PU</option>
                    <option value="Dinas PDAM">Dinas PDAM</option>
                    <option value="Dinas Perhubungan">Dinas Perhubungan</option>
                    <option value="Dinas Kebersihan">Dinas Kebersihan</option>
                    <option value="Dinas Sosial">Dinas Sosial</option>
                    <option value="Dinas Kesehatan">Dinas Kesehatan</option>
                    <option value="Dinas Umum">Dinas Umum</option>
                </select>
            </div>
            <button type="submit"
                class="w-full py-2.5 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 transition-colors text-sm">
                Daftar Akun
            </button>
        </form>

        <div class="text-center text-xs text-gray-500">
            Sudah memiliki akun petugas? <a href="/admin/login" class="text-indigo-600 hover:text-indigo-800 font-semibold underline">Masuk di sini</a>
        </div>
    </div>
</main>
{% endblock %}
